name: DevSecOps Three-Tier Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Optimization: Concurrency to cancel old runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- SECURITY TIER: Fast Parallel Scans ---
  security-scans:
    name: Parallel Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Python Cache
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      # Node Cache
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Run Bandit (Fast SAST)
        run: |
          pip install bandit
          bandit -r backend/ || true

      - name: Run Safety (Fast SCA)
        run: |
          pip install safety
          safety check -r backend/requirements.txt || true

      - name: Frontend Audit
        working-directory: ./frontend
        run: npm audit --audit-level=high || true

      - name: TruffleHog (Secrets)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: ${{ github.sha }}

  # --- OPTIMIZED DEPLOYMENT ---
  deploy-to-vercel:
    name: Rapid Vercel Deploy
    needs: security-scans
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          path: devsecops-pipeline 

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Link and Deploy

        working-directory: ./devsecops-pipeline
        id: deploy
        env:
          VERCEL_ORG_ID: "${{ secrets.VERCEL_ORG_ID }}"
          VERCEL_PROJECT_ID: "${{ secrets.VERCEL_PROJECT_ID }}"
          VERCEL_TOKEN: "${{ secrets.VERCEL_TOKEN }}"
        run: |
          # Use --prod and link in one go for maximum speed
          URL=$(vercel deploy --prod --yes --token=${{ env.VERCEL_TOKEN }})
          echo "DEPLOY_URL=$URL" >> $GITHUB_ENV
          echo "Deployed successfully to: $URL"


      - name: Fast Health Check
        run: |
          echo "Checking $DEPLOY_URL..."
          # Reduced sleep for speed, but ensures propagation
          sleep 20
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/api/health")
          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 401 ]; then
            echo "✅ Deployment is reachable (Status: $HTTP_CODE)"
          else
            echo "❌ Failed (Status: $HTTP_CODE)"
            exit 1
          fi
