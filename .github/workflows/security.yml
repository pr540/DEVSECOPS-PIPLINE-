name: DevSecOps Three-Tier Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  # --- TIER 1: Code Security (SAST) ---
  code-security:
    name: SAST Scan (CodeQL & Bandit)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: 'javascript, python'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

      - name: Run Bandit
        run: |
          pip install bandit
          bandit -r backend/ -f json -o bandit-results.json || true

  # --- TIER 2: Dependency Security ---
  dependency-security:
    name: SCA Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Frontend Audit
        working-directory: ./frontend
        run: npm audit --audit-level=high

      - name: Backend Safety Check
        run: |
          pip install safety
          safety check -r backend/requirements.txt || true

  # --- TIER 3: Secrets Scan ---
  secrets-security:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: ${{ github.sha }}

  # --- DEPLOYMENT TIER: Vercel ---
  deploy-to-vercel:
    name: Deploy to Vercel
    needs: [code-security, dependency-security, secrets-security]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      # IMPORTANT: Ensure these are set in GitHub Repository SECRETS
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v3

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment Information
        working-directory: ./frontend
        run: vercel pull --yes --environment=production --token=${{ env.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        working-directory: ./frontend
        run: vercel build --prod --token=${{ env.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        working-directory: ./frontend
        run: vercel deploy --prebuilt --prod --token=${{ env.VERCEL_TOKEN }}

      - name: Post-Deployment Monitoring (Health Check)
        run: |
          echo "Waiting for propagation..."
          sleep 30
          curl -f -s https://frontend-bezew4b0i-pr540s-projects.vercel.app/api/health || { 
            echo "❌ Backend health check failed on /api/health"; 
            echo "Checking root API..."; 
            curl -f -s https://frontend-bezew4b0i-pr540s-projects.vercel.app/api || exit 1; 
          }
          echo "✅ Health check passed! System is dynamic and monitors are active."
          echo "📊 Monitoring available at: https://frontend-bezew4b0i-pr540s-projects.vercel.app/api/metrics"
