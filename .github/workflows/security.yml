name: DevSecOps Three-Tier Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  # --- TIER 1: Code Security (SAST) ---
  code-security:
    name: SAST Scan (CodeQL & Bandit)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: 'javascript, python'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

      - name: Run Bandit
        run: |
          pip install bandit
          bandit -r backend/ -f json -o bandit-results.json || true

  # --- TIER 2: Dependency Security ---
  dependency-security:
    name: SCA Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Frontend Audit
        working-directory: ./frontend
        run: npm audit --audit-level=high

      - name: Backend Safety Check
        run: |
          pip install safety
          safety check -r backend/requirements.txt || true

  # --- TIER 3: Secrets Scan ---
  secrets-security:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: ${{ github.sha }}

  # --- DEPLOYMENT TIER: Vercel ---
  deploy-to-vercel:
    name: Deploy to Vercel
    needs: [code-security, dependency-security, secrets-security]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || vars.VERCEL_ORG_ID || secrets.ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID || vars.VERCEL_PROJECT_ID || secrets.PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          path: devsecops-pipeline 

      - name: Install Vercel CLI
        run: npm install -g vercel

      # --- FIX: Deploy directly to Vercel and let Vercel handle the Python build ---
      # This avoids the "uv not found" error on the GitHub runner
      - name: Deploy to Vercel
        working-directory: ./devsecops-pipeline
        id: deploy
        run: |
          URL=$(vercel deploy --prod --yes --token=${{ env.VERCEL_TOKEN }})
          echo "DEPLOY_URL=$URL" >> $GITHUB_ENV
          echo "Deployed successfully to: $URL"

      - name: Dynamic Health Check
        run: |
          echo "Checking $DEPLOY_URL..."
          sleep 60
          curl -f -s "$DEPLOY_URL/api/health" || { echo "❌ Backend health check failed"; exit 1; }
          echo "✅ All systems operational!"
